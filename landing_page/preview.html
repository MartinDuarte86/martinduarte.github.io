<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview de Landing — Martín Duarte</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0F172A; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #F8FAFC; min-height: 100vh; display: flex; flex-direction: column; }
    .bar {
      background: #1E293B;
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }
    .bar-logo { font-weight: 800; font-size: 15px; letter-spacing: -.02em; }
    .bar-logo span:last-child { color: #2563EB; }
    .bar-info { font-size: 13px; color: #64748B; }
    .bar-info strong { color: #94A3B8; }
    .preview-wrap { flex: 1; display: flex; flex-direction: column; }
    iframe { flex: 1; border: none; width: 100%; height: 100%; min-height: calc(100vh - 57px); }
    .loading { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 16px; color: #64748B; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,.1); border-top-color: #2563EB; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-card { background: #1E293B; border-radius: 16px; padding: 32px; max-width: 420px; text-align: center; }
    .error-card h2 { color: #F59E0B; margin-bottom: 12px; }
    .error-card p { color: #64748B; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="bar">
    <span class="bar-logo"><span>MARTIN</span><span>DUARTE</span></span>
    <span class="bar-info">Preview del cliente — <strong id="bar-brand">Cargando...</strong></span>
  </div>

  <div class="preview-wrap" id="preview-wrap">
    <div class="loading" id="loading-state">
      <div class="spinner"></div>
      <span>Cargando preview...</span>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const gistId = params.get('gist_id');

    if (!gistId) {
      showError('Parámetro faltante', 'No se encontró el gist_id en la URL. Verificá el link del email.');
    } else {
      loadPreview(gistId);
    }

    async function loadPreview(id) {
      try {
        const res = await fetch(`https://api.github.com/gists/${id}`, {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });

        if (!res.ok) throw new Error(`Gist no encontrado (${res.status})`);

        const gist = await res.json();
        const html = gist.files['landing.html']?.content;

        if (!html) throw new Error('El archivo landing.html no existe en el Gist');

        // Mostrar info en la barra
        const description = gist.description || 'Landing page';
        document.getElementById('bar-brand').textContent = description.replace('Landing page — ', '');

        // Renderizar en iframe
        const wrap = document.getElementById('preview-wrap');
        wrap.innerHTML = '';

        const iframe = document.createElement('iframe');
        iframe.title = 'Preview de landing page';
        iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts');
        wrap.appendChild(iframe);

        const blob = new Blob([html], { type: 'text/html' });
        iframe.src = URL.createObjectURL(blob);
      } catch (err) {
        showError('No se pudo cargar el preview', err.message);
      }
    }

    function showError(title, message) {
      document.getElementById('loading-state')?.remove();
      const wrap = document.getElementById('preview-wrap');
      wrap.style.alignItems = 'center';
      wrap.style.justifyContent = 'center';
      wrap.innerHTML = `<div class="error-card"><h2>${title}</h2><p>${message}</p></div>`;
    }
  </script>
</body>
</html>
